name: Review 2008 corpus one-off

on:
  push:
    branches:
      - analysis/corpus-index
    paths:
      - .github/workflows/review-2008-oneoff.yml

permissions:
  contents: write

jobs:
  review-2008:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis/corpus-index
          fetch-depth: 0
          lfs: false

      - name: Install review dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y antiword catdoc p7zip-full unrar-free
          python -m pip install --upgrade pip
          python -m pip install PyMuPDF Pillow

      - name: Build 2008 physical inventory and page review bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import hashlib, json, mimetypes, os, re, subprocess, sys, traceback
          from datetime import datetime, timezone
          from pathlib import Path
          import fitz
          from PIL import Image, ImageDraw, ImageFont

          repo = Path.cwd()
          roots = sorted(p for p in repo.iterdir() if p.is_dir() and p.name.startswith('2008年数学建模国赛'))
          if not roots:
              raise SystemExit('No 2008 source directory found')

          out = repo / 'analysis-index' / '00_control'
          out.mkdir(parents=True, exist_ok=True)
          artifact = repo / 'review-2008-artifact'
          sheets_dir = artifact / 'contact_sheets'
          sheets_dir.mkdir(parents=True, exist_ok=True)

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open('rb') as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          def run_extract(cmd: list[str], timeout: int = 60) -> tuple[str, str]:
              try:
                  p = subprocess.run(cmd, capture_output=True, timeout=timeout)
                  text = p.stdout.decode('utf-8', errors='replace')
                  err = p.stderr.decode('utf-8', errors='replace')
                  return text, err
              except Exception as exc:
                  return '', f'{type(exc).__name__}: {exc}'

          def safe_stem(path: Path) -> str:
              rel = path.relative_to(repo).as_posix()
              slug = re.sub(r'[^0-9A-Za-z._-]+', '_', path.stem)[:70].strip('_') or 'file'
              return f'{slug}_{hashlib.sha1(rel.encode("utf-8")).hexdigest()[:12]}'

          physical = []
          page_rows = []
          nonpdf_rows = []
          errors = []
          pdf_count = 0
          page_count = 0

          files = []
          for root in roots:
              files.extend(p for p in root.rglob('*') if p.is_file())
          files = sorted(files, key=lambda p: p.relative_to(repo).as_posix())

          for path in files:
              rel = path.relative_to(repo).as_posix()
              ext = path.suffix.lower()
              stat = path.stat()
              digest = sha256(path)
              rec = {
                  'relative_path': rel,
                  'filename': path.name,
                  'extension': ext,
                  'size_bytes': stat.st_size,
                  'sha256': digest,
                  'mime_guess': mimetypes.guess_type(path.name)[0] or 'unknown',
                  'year': 2008,
                  'physical_carrier_id': 'physical_' + digest[:16],
              }
              physical.append(rec)

              if ext == '.pdf':
                  pdf_count += 1
                  pdf_errors = []
                  pages_for_sheet = []
                  try:
                      doc = fitz.open(path)
                      rec['pdf_page_count'] = doc.page_count
                      rec['pdf_needs_password'] = bool(doc.needs_pass)
                      rec['pdf_is_repaired'] = bool(getattr(doc, 'is_repaired', False))
                      for i in range(doc.page_count):
                          row = {
                              'relative_path': rel,
                              'sha256': digest,
                              'page_number': i + 1,
                              'page_index': i,
                              'review_status': 'pending_manual_visual_review',
                          }
                          try:
                              page = doc.load_page(i)
                              text = page.get_text('text') or ''
                              words = page.get_text('words') or []
                              images = page.get_images(full=True) or []
                              drawings = page.get_drawings() or []
                              row.update({
                                  'width_pt': round(page.rect.width, 3),
                                  'height_pt': round(page.rect.height, 3),
                                  'text_char_count': len(text),
                                  'word_count': len(words),
                                  'image_count': len(images),
                                  'drawing_count': len(drawings),
                                  'text_excerpt': re.sub(r'\s+', ' ', text).strip()[:1200],
                                  'render_status': 'ok',
                              })
                              pix = page.get_pixmap(matrix=fitz.Matrix(0.65, 0.65), alpha=False)
                              img = Image.frombytes('RGB', (pix.width, pix.height), pix.samples)
                              pages_for_sheet.append((i + 1, img.copy()))
                          except Exception as exc:
                              msg = f'page {i+1}: {type(exc).__name__}: {exc}'
                              row.update({'render_status': 'error', 'error': msg, 'text_excerpt': ''})
                              pdf_errors.append(msg)
                          page_rows.append(row)
                          page_count += 1
                      doc.close()
                  except Exception as exc:
                      msg = f'{type(exc).__name__}: {exc}'
                      rec['pdf_open_error'] = msg
                      pdf_errors.append(msg)
                      errors.append({'relative_path': rel, 'stage': 'pdf_open', 'error': msg})

                  # Create all-page contact sheets, 12 pages per JPEG.
                  if pages_for_sheet:
                      font = ImageFont.load_default()
                      for part_start in range(0, len(pages_for_sheet), 12):
                          group = pages_for_sheet[part_start:part_start + 12]
                          thumb_w, thumb_h = 360, 510
                          label_h = 24
                          cols = 3
                          rows = (len(group) + cols - 1) // cols
                          canvas = Image.new('RGB', (cols * thumb_w, rows * (thumb_h + label_h)), 'white')
                          draw = ImageDraw.Draw(canvas)
                          for j, (pno, img) in enumerate(group):
                              img.thumbnail((thumb_w - 8, thumb_h - 8))
                              x = (j % cols) * thumb_w + (thumb_w - img.width) // 2
                              y0 = (j // cols) * (thumb_h + label_h)
                              y = y0 + label_h + (thumb_h - img.height) // 2
                              draw.text(((j % cols) * thumb_w + 4, y0 + 5), f'page {pno}', fill='black', font=font)
                              canvas.paste(img, (x, y))
                          part = part_start // 12 + 1
                          canvas.save(sheets_dir / f'{safe_stem(path)}_part{part:02d}.jpg', quality=82, optimize=True)
                  rec['pdf_review_errors'] = pdf_errors

              elif ext in {'.doc', '.xls', '.rar', '.zip', '.7z', '.txt', '.csv', '.docx', '.xlsx', '.mdb'}:
                  text = ''
                  stderr = ''
                  method = 'metadata_only'
                  if ext == '.doc':
                      text, stderr = run_extract(['antiword', str(path)])
                      method = 'antiword'
                  elif ext == '.xls':
                      text, stderr = run_extract(['xls2csv', str(path)])
                      method = 'xls2csv'
                  elif ext in {'.rar', '.zip', '.7z'}:
                      text, stderr = run_extract(['7z', 'l', '-slt', str(path)])
                      method = '7z_list'
                  elif ext in {'.txt', '.csv'}:
                      text = path.read_text(encoding='utf-8', errors='replace')
                      method = 'direct_text'
                  else:
                      text, stderr = run_extract(['strings', '-n', '4', str(path)])
                      method = 'strings'
                  nonpdf_rows.append({
                      'relative_path': rel,
                      'sha256': digest,
                      'extension': ext,
                      'extraction_method': method,
                      'text_excerpt': re.sub(r'\s+', ' ', text).strip()[:8000],
                      'stderr_excerpt': re.sub(r'\s+', ' ', stderr).strip()[:1200],
                      'review_status': 'pending_manual_content_review',
                  })

          generated_at = datetime.now(timezone.utc).isoformat()
          inventory = {
              'year': 2008,
              'source_baseline_commit': 'a042ecf898feaba6fc81d543a10e0188db8b2b12',
              'source_roots': [p.name for p in roots],
              'generated_at': generated_at,
              'physical_file_count': len(physical),
              'pdf_file_count': pdf_count,
              'pdf_page_count': page_count,
              'files': physical,
              'errors': errors,
          }
          (out / '2008_remote_inventory.json').write_text(json.dumps(inventory, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          with (out / '2008_page_review_index.jsonl').open('w', encoding='utf-8') as f:
              for row in page_rows:
                  f.write(json.dumps(row, ensure_ascii=False) + '\n')
          with (out / '2008_nonpdf_extracts.jsonl').open('w', encoding='utf-8') as f:
              for row in nonpdf_rows:
                  f.write(json.dumps(row, ensure_ascii=False) + '\n')
          run = {
              'year': 2008,
              'status': 'review_bundle_generated',
              'generated_at': generated_at,
              'physical_file_count': len(physical),
              'pdf_file_count': pdf_count,
              'pdf_page_count': page_count,
              'nonpdf_review_object_count': len(nonpdf_rows),
              'error_count': len(errors),
              'manual_review_complete': False,
              'next_action': 'manual review of all contact sheets and non-PDF extracts',
          }
          (out / '2008_review_run.json').write_text(json.dumps(run, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          (artifact / 'README.txt').write_text(
              '2008 manual review bundle\nAll PDF pages are represented in contact sheets.\n'
              'Use analysis-index/00_control/2008_page_review_index.jsonl for page-level text metadata.\n',
              encoding='utf-8'
          )
          print(json.dumps(run, ensure_ascii=False))
          PY

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-2008-bundle
          path: |
            review-2008-artifact/
            analysis-index/00_control/2008_remote_inventory.json
            analysis-index/00_control/2008_page_review_index.jsonl
            analysis-index/00_control/2008_nonpdf_extracts.jsonl
            analysis-index/00_control/2008_review_run.json
          if-no-files-found: error
          retention-days: 30

      - name: Commit review index and remove one-off workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis-index/00_control/2008_remote_inventory.json \
                  analysis-index/00_control/2008_page_review_index.jsonl \
                  analysis-index/00_control/2008_nonpdf_extracts.jsonl \
                  analysis-index/00_control/2008_review_run.json
          git rm .github/workflows/review-2008-oneoff.yml
          git commit -m "generate 2008 manual review bundle"
          git push origin HEAD:analysis/corpus-index
