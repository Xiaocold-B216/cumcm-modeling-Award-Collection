name: finalize-2008-2009-oneoff
on:
  workflow_dispatch:
  push:
    branches:
      - analysis/corpus-index
    paths:
      - .github/workflows/finalize-2008-2009-oneoff.yml
permissions:
  contents: write
jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: analysis/corpus-index
          fetch-depth: 0
          lfs: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y antiword
          python -m pip install --upgrade pip
          python -m pip install pymupdf
      - name: Finalize 2008 and 2009
        run: |
          python scripts/finalize_2008_manual_v2.py
          python -m unittest tests.test_2008_manual_finalization -v
          python scripts/finalize_2009_manual_v2.py
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path
          root=Path('analysis-index')
          docs=[json.loads(x) for x in (root/'02_documents/logical_documents_2009.jsonl').read_text(encoding='utf-8').splitlines() if x.strip()]
          reps=[json.loads(x) for x in (root/'02_documents/representations_2009.jsonl').read_text(encoding='utf-8').splitlines() if x.strip()]
          pages=[json.loads(x) for x in (root/'02_documents/page_segments_2009.jsonl').read_text(encoding='utf-8').splitlines() if x.strip()]
          lineages=[json.loads(x) for x in (root/'04_relations/2009_solution_lineages.jsonl').read_text(encoding='utf-8').splitlines() if x.strip()]
          roles=Counter(d['document_role'] for d in docs); kinds=Counter(d['object_kind'] for d in docs)
          assert len(docs)==27
          assert kinds['solution_paper']==21
          assert kinds['secondary_publication']==1
          assert kinds['problem']==4
          assert kinds['supporting_object']==1
          assert roles['expert_commentary']==0
          assert len(reps)==27 and len(lineages)==21 and len(pages)==393
          assert Counter(d['problem_code'] for d in docs if d['document_role']=='award_paper')==Counter({'A':7,'B':5,'C':5,'D':4})
          names={'document_card.md','metadata.json','extracted_text.md','page_map.json','evidence.jsonl','review_record.md'}
          for d in docs:
              folder=root/'02_documents/cards'/d['logical_document_id']
              assert names.issubset({p.name for p in folder.iterdir()})
          gate=json.loads((root/'08_quality/gates/2009_gate.json').read_text(encoding='utf-8'))
          assert gate['status']=='pass_pending_remote_readback'
          assert gate['counts']=={'physical_carriers':27,'logical_documents':27,'solution_papers':21,'expert_commentaries':0,'problem_statements':4,'supporting_objects':1,'secondary_publications':1,'solution_lineages':21,'representations':27,'pdf_pages':393}
          PY
      - name: Commit audited outputs
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/workflows/finalize-2008-2009-oneoff.yml
          git add -A
          git add -f analysis-index/02_documents/cards/*/extracted_text.md
          git commit -m "finalize manually reviewed 2008 and 2009 corpora"
          git push origin HEAD:analysis/corpus-index
          echo "ANALYSIS_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Record remote readback pass
        run: |
          git fetch origin analysis/corpus-index
          test "$(git rev-parse origin/analysis/corpus-index)" = "$ANALYSIS_COMMIT"
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          root=Path('analysis-index')
          sha=os.environ['ANALYSIS_COMMIT']
          stamp=time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
          for year in (2008,2009):
              for p in [root/f'08_quality/gates/{year}_gate.json',root/f'08_quality/{year}_quality_gate.json']:
                  d=json.loads(p.read_text(encoding='utf-8')); d['status']='pass'; d['checks']['remote_readback_verified']=True; d['note']='All manual, local, publish, and remote readback checks passed.'; d['updated_at']=stamp; p.write_text(json.dumps(d,ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
              p=root/f'09_checkpoints/{year}_checkpoint.json'; d=json.loads(p.read_text(encoding='utf-8')); d['status']='pass'; d['remote_readback_verified']=True; d['analysis_commit_sha']=sha; d['remote_readback_at']=stamp; p.write_text(json.dumps(d,ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
              p=root/f'00_control/{year}_finalization_summary.json'; d=json.loads(p.read_text(encoding='utf-8')); d['status']='pass'; d['remote_readback_verified']=True; d['analysis_commit_sha']=sha; d['updated_at']=stamp; p.write_text(json.dumps(d,ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
              p=root/f'00_control/{year}_remote_readback.json'; p.write_text(json.dumps({'year':year,'status':'pass','analysis_commit_sha':sha,'remote_readback_verified':True,'verified_at':stamp},ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          p=root/'00_control/progress.json'; d=json.loads(p.read_text(encoding='utf-8')); d['completed_years']=sorted(set(d.get('completed_years',[]))|{2008,2009}); ys=dict(d.get('year_status',{})); ys['2008']='pass'; ys['2009']='pass'; d['year_status']=ys; d['last_verified_complete_year']=2009; d['next_recommended_year']=2010; d['last_verified_remote_checkpoint']=sha; d['remote_publish_status']='pass'; d['updated_at']=stamp; p.write_text(json.dumps(d,ensure_ascii=False,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          PY
          python -m unittest tests.test_2008_manual_finalization -v
          git add -A
          git commit -m "record 2008 and 2009 remote pass checkpoints"
          git push origin HEAD:analysis/corpus-index
          FINAL_SHA=$(git rev-parse HEAD)
          git tag -f analysis_checkpoint_through_2008 "$FINAL_SHA"
          git tag -f analysis_checkpoint_through_2009 "$FINAL_SHA"
          git push origin -f analysis_checkpoint_through_2008 analysis_checkpoint_through_2009
          git fetch origin analysis/corpus-index --tags
          test "$(git rev-parse origin/analysis/corpus-index)" = "$FINAL_SHA"
          test "$(git rev-parse analysis_checkpoint_through_2009)" = "$FINAL_SHA"
