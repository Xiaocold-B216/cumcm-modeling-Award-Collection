name: Finalize manually reviewed 2008 corpus

on:
  push:
    branches:
      - analysis/corpus-index
    paths:
      - .github/workflows/finalize-2008-oneoff.yml

permissions:
  contents: write

jobs:
  finalize-2008:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis/corpus-index
          fetch-depth: 0
          lfs: false

      - name: Configure Git and capture scope base
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "PRE_FINALIZE_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Install finalization dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y antiword
          python -m pip install --upgrade pip
          python -m pip install pypdf PyMuPDF Pillow

      - name: Materialize audited finalizer and tests
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip
          from pathlib import Path
          script_payload = ''''''
          test_payload = ''''''
          Path('scripts/finalize_2008_manual.py').write_bytes(gzip.decompress(base64.b64decode(script_payload)))
          Path('tests/test_2008_manual_finalization.py').write_bytes(gzip.decompress(base64.b64decode(test_payload)))
          PY
          chmod +x scripts/finalize_2008_manual.py
          python -m py_compile scripts/finalize_2008_manual.py tests/test_2008_manual_finalization.py

      - name: Generate final 2008 analysis layer
        run: |
          python scripts/finalize_2008_manual.py | tee analysis-index/00_control/run_logs/year-2008-finalize.json

      - name: Run tests
        run: |
          python -m unittest discover -s tests
          git diff --check

      - name: Enforce year and source scope
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only "$PRE_FINALIZE_HEAD" | grep -E '(^|/)2009([^0-9]|$)'; then
            echo "2009-specific output was modified" >&2
            exit 1
          fi
          git diff --name-only a042ecf898feaba6fc81d543a10e0188db8b2b12 -- \
            | grep -Ev '^(analysis-index/|scripts/|tests/|schema/|\.github/|README_ANALYSIS\.md$|README_PIPELINE\.md$|\.gitignore$|\.bootstrap/)' \
            > /tmp/unexpected_source_changes || true
          test ! -s /tmp/unexpected_source_changes || { cat /tmp/unexpected_source_changes >&2; exit 1; }

      - name: Commit tested 2008 analysis
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/finalize-2008-oneoff.yml
          git add analysis-index scripts/finalize_2008_manual.py tests/test_2008_manual_finalization.py
          find analysis-index/02_documents/cards -name extracted_text.md -print0 | xargs -0 git add -f --
          git commit -m "finalize manually reviewed 2008 award corpus"
          ANALYSIS_COMMIT=$(git rev-parse HEAD)
          git push origin HEAD:analysis/corpus-index
          echo "ANALYSIS_COMMIT=$ANALYSIS_COMMIT" >> "$GITHUB_ENV"

      - name: Remote readback and checkpoint record
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin analysis/corpus-index
          test "$(git rev-parse refs/remotes/origin/analysis/corpus-index)" = "$ANALYSIS_COMMIT"
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          root = Path('analysis-index')
          commit = os.environ['ANALYSIS_COMMIT']
          stamp = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
          cp_path = root/'09_checkpoints/2008_checkpoint.json'
          cp = json.loads(cp_path.read_text(encoding='utf-8'))
          cp.update({'remote_readback_verified': True, 'verified_analysis_commit': commit,
                     'remote_branch': 'analysis/corpus-index', 'remote_readback_at': stamp})
          cp_path.write_text(json.dumps(cp, ensure_ascii=False, indent=2, sort_keys=True)+'\n', encoding='utf-8')
          p_path = root/'00_control/progress.json'
          p = json.loads(p_path.read_text(encoding='utf-8'))
          p.update({'last_verified_remote_checkpoint': commit,
                    'remote_publish_status': 'remote_readback_verified', 'updated_at': stamp})
          p_path.write_text(json.dumps(p, ensure_ascii=False, indent=2, sort_keys=True)+'\n', encoding='utf-8')
          for gate_path in (root/'08_quality/gates/2008_gate.json', root/'08_quality/2008_quality_gate.json'):
              gate = json.loads(gate_path.read_text(encoding='utf-8'))
              gate['checks']['remote_readback_verified'] = True
              gate['verified_analysis_commit'] = commit
              gate['updated_at'] = stamp
              gate_path.write_text(json.dumps(gate, ensure_ascii=False, indent=2, sort_keys=True)+'\n', encoding='utf-8')
          summary_path = root/'00_control/2008_finalization_summary.json'
          summary = json.loads(summary_path.read_text(encoding='utf-8'))
          summary.update({'remote_readback_verified': True, 'verified_analysis_commit': commit, 'updated_at': stamp})
          summary_path.write_text(json.dumps(summary, ensure_ascii=False, indent=2, sort_keys=True)+'\n', encoding='utf-8')
          readback = {'year': 2008, 'status': 'pass', 'analysis_branch': 'analysis/corpus-index',
                      'verified_analysis_commit': commit, 'remote_readback_verified': True,
                      'checkpoint_tag': 'analysis_checkpoint_through_2008', 'verified_at': stamp}
          (root/'00_control/2008_remote_readback.json').write_text(
              json.dumps(readback, ensure_ascii=False, indent=2, sort_keys=True)+'\n', encoding='utf-8')
          PY
          python -m unittest discover -s tests
          git diff --check
          git add analysis-index/00_control/progress.json \
                  analysis-index/00_control/2008_finalization_summary.json \
                  analysis-index/00_control/2008_remote_readback.json \
                  analysis-index/08_quality/2008_quality_gate.json \
                  analysis-index/08_quality/gates/2008_gate.json \
                  analysis-index/09_checkpoints/2008_checkpoint.json
          git commit -m "record 2008 remote pass checkpoint"
          CHECKPOINT_COMMIT=$(git rev-parse HEAD)
          git push origin HEAD:analysis/corpus-index
          git fetch origin analysis/corpus-index
          test "$(git rev-parse refs/remotes/origin/analysis/corpus-index)" = "$CHECKPOINT_COMMIT"
          git tag -f analysis_checkpoint_through_2008 "$CHECKPOINT_COMMIT"
          git push -f origin refs/tags/analysis_checkpoint_through_2008
          test "$(git ls-remote --tags origin refs/tags/analysis_checkpoint_through_2008 | awk '{print $1}')" = "$CHECKPOINT_COMMIT"
          echo "CHECKPOINT_COMMIT=$CHECKPOINT_COMMIT" >> "$GITHUB_ENV"

      - name: Final invariant summary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          cp=json.loads(Path('analysis-index/09_checkpoints/2008_checkpoint.json').read_text(encoding='utf-8'))
          p=json.loads(Path('analysis-index/00_control/progress.json').read_text(encoding='utf-8'))
          assert cp['status']=='pass' and cp['remote_readback_verified'] is True
          assert p['last_verified_complete_year']==2008
          assert p['next_recommended_year']==2009
          assert 2008 in p['completed_years']
          print(json.dumps({'checkpoint': cp['status'], 'counts': cp['counts'],
                            'verified_analysis_commit': cp['verified_analysis_commit'],
                            'next_recommended_year': p['next_recommended_year']}, ensure_ascii=False))
          PY
